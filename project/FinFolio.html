<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FinFolio — 智慧資產管理 App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"/>
<script src="tokens.js"></script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; height: 100%;
    background: var(--ff-bg-warm-2, #F0EFEC);
    font-family: var(--ff-font-sans, "Noto Sans TC", -apple-system, system-ui, sans-serif);
    -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  #stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 32px 16px;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(217, 119, 87,0.07), transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 189, 140,0.04), transparent 60%),
      #F0EFEC;
  }
  #scale { transform-origin: center center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.9; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bob { 0%,100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 1; } }
  @keyframes slideIn-left {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideIn-right {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes freshPulse {
    0%   { background: rgba(232, 152, 120,0.32); }
    100% { background: rgba(217, 119, 87,0.10); }
  }
  @keyframes pageSlideIn {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  b { font-weight: 600; }
</style>
</head>
<body style="background-color: rgb(244, 241, 233)">
  <div id="stage" style="background-color: rgb(240, 238, 231)">
    <div id="scale">
      <div id="root"></div>
    </div>
  </div>

  <script src="stock-data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens/portfolio.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/accounts.jsx"></script>
  <script type="text/babel" src="screens/accounting.jsx"></script>
  <script type="text/babel" src="screens/advisor.jsx"></script>
  <script type="text/babel" src="screens/settings.jsx"></script>
  <script type="text/babel" src="screens/invest.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Scale phone frame to fit any viewport while keeping fixed 402×874 canvas
    function fit() {
      const stage = document.getElementById('stage');
      const scale = document.getElementById('scale');
      const W = stage.clientWidth - 32, H = stage.clientHeight - 32;
      const k = Math.min(W / 402, H / 920, 1.2);
      scale.style.transform = `scale(${k})`;
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 100);
    setTimeout(fit, 800);
  </script>
</body>
</html>
