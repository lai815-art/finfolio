<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>FinFolio — 智慧資產管理 App</title>
<!-- PWA / 加入主畫面（裝成 App）-->
<link rel="manifest" href="./manifest.webmanifest"/>
<meta name="theme-color" content="#F0EFEC"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="FinFolio"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="./icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"/>
<!-- Design tokens (sets window.TOKENS / FS / SP / PAD / RS / SH / fxToTWD …) — must run before the app bundle -->
<script src="./tokens.js"></script>
<!-- Runtime config (price service URL) -->
<script src="./config.js"></script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; height: 100%;
    background: var(--ff-bg-warm-2, #F0EFEC);
    font-family: var(--ff-font-sans, "Noto Sans TC", -apple-system, system-ui, sans-serif);
    -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  #stage {
    min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    padding: 0; overflow: hidden;
    background: #F0EEE7;
  }
  #scale { transform-origin: center center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.9; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bob { 0%,100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 1; } }
  @keyframes slideIn-left {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideIn-right {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes freshPulse {
    0%   { background: rgba(232, 152, 120,0.32); }
    100% { background: rgba(217, 119, 87,0.10); }
  }
  @keyframes pageSlideIn {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  b { font-weight: 600; }
</style>
</head>
<body>
  <div id="stage">
    <div id="scale">
      <div id="root"></div>
    </div>
  </div>

  <!-- Stock list / price helpers (sets window.US_STOCK_LIST / loadTWStocks …) -->
  <script src="./stock-data.js"></script>
  <!-- App bundle -->
  <script type="module" src="/src/main.js"></script>

  <script>
    // Scale the fixed 402×920 phone canvas to fit any viewport.
    function fit() {
      var stage = document.getElementById('stage');
      var scale = document.getElementById('scale');
      if (!stage || !scale) return;
      var w = stage.clientWidth, h = stage.clientHeight;
      var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
        || window.navigator.standalone === true;
      var k, appH;
      if (standalone) {
        // Installed app: scale to width, then stretch the canvas height to exactly fill the
        // viewport. Header pins to the very top, tab bar to the very bottom, no body scroll.
        k = w / 402;
        appH = Math.round(h / k);
      } else {
        // Browser preview: uniform fit of the fixed 402×874 canvas (centered, no frame).
        k = Math.min(w / 402, h / 874, 3);
        appH = 874;
      }
      scale.style.transform = 'scale(' + k + ')';
      document.documentElement.style.setProperty('--app-h', appH + 'px');
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 100);
    setTimeout(fit, 800);
  </script>
</body>
</html>
