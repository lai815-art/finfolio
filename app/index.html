<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>FinFolio — 智慧資產管理 App</title>
<!-- PWA / 加入主畫面（裝成 App）-->
<link rel="manifest" href="./manifest.webmanifest"/>
<meta name="theme-color" content="#F0EFEC"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="FinFolio"/>
<link rel="apple-touch-icon" href="./apple-touch-icon.png"/>
<link rel="icon" type="image/png" href="./icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"/>
<!-- Design tokens (sets window.TOKENS / FS / SP / PAD / RS / SH / fxToTWD …) — must run before the app bundle -->
<script src="./tokens.js"></script>
<!-- Runtime config (price service URL) -->
<script src="./config.js"></script>
<style>
  :root { color-scheme: light; }
  html, body { margin: 0; padding: 0; height: 100%;
    background: var(--ff-bg-warm-2, #F0EFEC);
    font-family: var(--ff-font-sans, "Noto Sans TC", -apple-system, system-ui, sans-serif);
    /* 數字等寬，讓表格金額對齊（字型本身用系統字，0 為乾淨橢圓、無斜槓/中點）*/
    font-variant-numeric: tabular-nums;
    -webkit-font-smoothing: antialiased;
    /* 鎖住整頁捲動：App 內容都用內部捲動容器，視窗本身不應該捲動。
       iOS 鍵盤彈出時會把整頁捲上去，收回後常留下殘餘捲動量，讓 fixed 的
       #stage 看起來被往上推、頂端按鈕被切到。整頁固定即可根治，且不動縮放。*/
    overflow: hidden; overscroll-behavior: none;
    position: fixed; inset: 0; width: 100%; }
  *, *::before, *::after { box-sizing: border-box; }
  #stage {
    position: fixed; inset: 0;
    height: 100vh; height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 0; overflow: hidden;
    background: #F0EEE7;
  }
  #scale { transform-origin: center center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.9; } 100% { transform: scale(1.4); opacity: 0; } }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bob { 0%,100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(-4px); opacity: 1; } }
  @keyframes slideIn-left {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideIn-right {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes freshPulse {
    0%   { background: rgba(232, 152, 120,0.32); }
    100% { background: rgba(217, 119, 87,0.10); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  @keyframes pageSlideIn {
    from { transform: translateX(100%); }
    to   { transform: translateX(0); }
  }
  *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  * { scrollbar-width: none; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }
  b { font-weight: 600; }
  /* App-like feel: long-press / drag must not select text or pop the iOS callout.
     Real input fields opt back in below so typing & editing still work. */
  #root, #root * {
    -webkit-user-select: none; -moz-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  input, textarea, [contenteditable="true"] {
    -webkit-user-select: text; -moz-user-select: text; user-select: text;
    -webkit-touch-callout: default;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="scale">
      <div id="root"></div>
    </div>
  </div>

  <!-- Stock list / price helpers (sets window.US_STOCK_LIST / loadTWStocks …) -->
  <script src="./stock-data.js"></script>
  <!-- App bundle -->
  <script type="module" src="/src/main.js"></script>

  <script>
    // Detect "installed app" once at startup and freeze it. The app bundle reads the
    // same flag (window.FF_STANDALONE) so header insets always match the canvas sizing.
    // Latched true: some engines briefly report display-mode:browser on a warm relaunch,
    // which previously made fit() fall back to the fixed 402×874 box and stop filling.
    window.FF_STANDALONE = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
      || window.navigator.standalone === true;

    // Scale the 402-wide phone canvas to fit any viewport.
    function fit() {
      var stage = document.getElementById('stage');
      var scale = document.getElementById('scale');
      if (!stage || !scale) return;
      // Use window.innerWidth/Height — the real viewport. NOT stage.clientHeight:
      // on phones narrower than 402px the scaled canvas's un-transformed layout box
      // is taller than the screen, which grows #stage, which fed back into a bigger
      // canvas each ResizeObserver tick → the screen "ran away" ("跑掉"). innerHeight
      // is independent of content AND does not shrink when the keyboard opens (only
      // visualViewport does), so it is stable on both counts.
      var w = window.innerWidth || stage.clientWidth;
      var h = window.innerHeight || stage.clientHeight;
      if (!w || !h) return;
      var k, appH;
      if (window.FF_STANDALONE) {
        // Installed app: scale to width, then stretch the canvas height to exactly fill the
        // viewport. Header pins to the very top, tab bar to the very bottom, no body scroll.
        k = w / 402;
        appH = Math.round(h / k);
      } else {
        // Browser preview: uniform fit of the fixed 402×874 canvas (centered, no frame).
        k = Math.min(w / 402, h / 874, 3);
        appH = 874;
      }
      scale.style.transform = 'scale(' + k + ')';
      document.documentElement.style.setProperty('--app-h', appH + 'px');

      // 頂部 header 留白：用畫布外探針量真實安全區(瀏海/動態島, 螢幕px)，÷k 換算成畫布座標。
      // 鍵盤/檔案選擇器過場時 iOS 會短暫回報偏小的值，會讓留白縮掉、頂端按鈕被切；
      // 直向的安全區固定不變小，所以「取歷來最大值」穩定住，過場的小瞬時值不採用。
      // 依裝置實際安全區 +2px 當 header 高度：夠清瀏海不被切，也不會像固定值那樣過多。
      var probe = document.getElementById('ff-sat-probe');
      if (!probe) {
        probe = document.createElement('div');
        probe.id = 'ff-sat-probe';
        probe.style.cssText = 'position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none';
        document.body.appendChild(probe);
      }
      var satRaw = probe.getBoundingClientRect().height;
      var satScreen = satRaw;
      if (window.FF_STANDALONE && window.innerHeight > window.innerWidth) {
        // 直向的獨立 App 一定有安全區（瀏海最少 ~44px、動態島 ~59px）。鍵盤/檔案選擇器
        // 過場時 iOS 會短暫回報 0 或偏小值，若直接採用就會讓頂部留白瞬間縮掉、返回鍵被切。
        // 對策：(1)記錄歷來最大值 (2)設 44px 下限 —— 兩者取大，過場的小瞬時值永遠不會勝出。
        if (satRaw > (window.__ffMaxSat || 0)) window.__ffMaxSat = Math.min(satRaw, 63);
        // 夾在 [44,63]：44 下限避免過場瞬時 0 把留白縮掉、頂端按鈕被切；
        // 63 上限避免某次過場回報的異常大值被記住後永久卡住、造成頂部留白過多。
        // （直向真實安全區：瀏海機 ~47、動態島 ~59，63 已含餘裕。）
        satScreen = Math.min(Math.max(satRaw, window.__ffMaxSat || 0, 44), 63);
        if (satRaw < satScreen) { // 目前讀到偏小（過場中）→ 稍後再校正一次
          clearTimeout(window.__ffSatRetry);
          window.__ffSatRetry = setTimeout(fit, 350);
        }
      }
      // 動態島/瀏海是「置中凸起」的。主畫面標題(FinFolio/資產帳戶…)短、靠左，右上只有一顆
      // 眼睛按鈕，都在島的「兩側」不會被蓋到，所以只要清掉狀態列文字那一列(約44px)即可，
      // 不必含整個動態島高度——上限 44px，消除主畫面多餘的頂部留白。
      // 明細頁(資產配置明細…)標題較長、會延伸到中央島的下方，需要完整安全區才不會被切，
      // 所以 --ff-detail-top 仍用完整安全區 +2px。
      var satC = Math.round(satScreen / k);
      var mainTop = window.FF_STANDALONE ? Math.min(satC, 28) : 62;
      var detailTop = window.FF_STANDALONE ? satC + 2 : 62;
      document.documentElement.style.setProperty('--ff-detail-top', detailTop + 'px');
      document.documentElement.style.setProperty('--ff-main-top', mainTop + 'px');
    }

    // Re-fit on every event that can change the viewport — including warm relaunches
    // (pageshow/visibilitychange) where no resize fires but the size may have changed.
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', fit);
    window.addEventListener('pageshow', fit);
    window.addEventListener('focus', fit);
    document.addEventListener('visibilitychange', function () { if (!document.hidden) fit(); });
    // NOTE: intentionally NOT re-fitting on visualViewport resize/scroll — those fire
    // when the keyboard opens and must not resize the canvas (see fit() comment).
    if (window.ResizeObserver) {
      try { new ResizeObserver(fit).observe(document.getElementById('stage')); } catch (e) {}
    }

    // iOS 鍵盤：彈出時常把整個 position:fixed 畫面往上推（頂部縮進瀏海／動態島）。
    // 這是「視覺視窗被 pan」而非改變畫布大小——所以用 visualViewport 的位移量把 #stage
    // 往下補償回原位（不重算 fit、不改縮放，避免內容跑掉）；鍵盤收起後位移歸零即恢復。
    if (window.FF_STANDALONE && window.visualViewport) {
      var vv = window.visualViewport;
      var resetScroll = function () {
        // 鍵盤過場時 iOS 有時會把整個版面(含 position:fixed 的 body)往上捲，
        // 而且不一定反映在 window.scrollY——connect 各種捲動容器一起歸零才保險。
        try { if (window.scrollY || window.pageYOffset) window.scrollTo(0, 0); } catch (_) {}
        try { document.documentElement.scrollTop = 0; } catch (_) {}
        try { document.body.scrollTop = 0; } catch (_) {}
        var se = document.scrollingElement; if (se) try { se.scrollTop = 0; } catch (_) {}
      };
      var vvAdjust = function () {
        var st = document.getElementById('stage');
        if (!st) return;
        resetScroll();
        var off = Math.max(0, vv.offsetTop || 0);
        st.style.transform = off > 1 ? 'translateY(' + off + 'px)' : '';
      };
      vv.addEventListener('resize', vvAdjust);
      vv.addEventListener('scroll', vvAdjust);
      window.__ffResetScroll = resetScroll;
      // body 已鎖 position:fixed，任何 window 捲動都是 iOS 鍵盤過場造成的假捲動 → 立即歸零。
      window.addEventListener('scroll', resetScroll, { passive: true });
    }

    // 鍵盤避讓：鍵盤蓋住下半部欄位時，光靠 scrollIntoView 不夠——欄位若在容器內容
    // 末端，容器已無捲動空間可把它捲到鍵盤上方。解法：鍵盤打開期間，給「聚焦欄位
    // 所在的可捲動容器」臨時加上等於鍵盤高度的底部內距（螢幕px ÷ 縮放k 轉成畫布座標），
    // 產生捲動空間後再把欄位捲到中央；鍵盤收起即還原內距。只動 padding 與捲動位置，
    // 不動畫布縮放與 transform，所以不會跑版。
    (function () {
      var padded = null, padOld = '';
      function scaleK() {
        try {
          var el = document.getElementById('scale');
          var m = new DOMMatrixReadOnly(getComputedStyle(el).transform);
          return m.a || 1;
        } catch (_) { return 1; }
      }
      function kbHeight() {
        if (!window.visualViewport) return 0;
        return Math.max(0, (window.innerHeight || 0) - window.visualViewport.height);
      }
      function scrollParent(el) {
        for (var n = el && el.parentElement; n; n = n.parentElement) {
          var s = getComputedStyle(n);
          if (/(auto|scroll)/.test(s.overflowY)) return n;
        }
        return null;
      }
      function restore() {
        if (padded) { padded.style.paddingBottom = padOld; padded = null; padOld = ''; }
      }
      function reveal() {
        var el = document.activeElement;
        if (!el || !/^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)) { restore(); return; }
        var kb = kbHeight();
        if (kb < 60) { // 鍵盤沒開（或已收起）：不加內距，仍置中一次
          restore();
          try { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (_) {}
          return;
        }
        var sc = scrollParent(el);
        if (sc) {
          if (padded && padded !== sc) restore();
          if (padded !== sc) { padded = sc; padOld = sc.style.paddingBottom; }
          sc.style.paddingBottom = Math.round(kb / scaleK() + 24) + 'px';
        }
        try { el.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (_) {}
      }
      // 聚焦後等鍵盤動畫、鍵盤高度改變時（打開/換輸入法/收起）都重新對位
      document.addEventListener('focusin', function () { setTimeout(reveal, 350); });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', function () { setTimeout(reveal, 60); });
      }
      document.addEventListener('focusout', function () {
        setTimeout(function () {
          var el = document.activeElement;
          if (el && /^(INPUT|TEXTAREA|SELECT)$/.test(el.tagName)) return; // 只是換到另一個輸入框
          restore();
          // 鍵盤收回後把殘餘的視窗捲動/位移歸零，並重排一次頂部安全區，
          // 避免 fixed 畫面被往上推、頂端按鈕被瀏海/動態島切到。多補幾拍：
          // iOS 收鍵盤的動畫尾段仍可能殘留位移，單次歸零常常太早、押不住。
          [0, 120, 300, 550, 850].forEach(function (t) {
            setTimeout(function () {
              if (window.__ffResetScroll) window.__ffResetScroll();
              var st = document.getElementById('stage');
              if (st && (!window.visualViewport || (window.visualViewport.offsetTop || 0) <= 1)) st.style.transform = '';
              fit();
            }, t);
          });
        }, 250);
      });
    })();
    // A few early ticks so the first paint settles, then keep correcting on the events above.
    [0, 100, 400, 800, 1500].forEach(function (t) { setTimeout(fit, t); });
  </script>
</body>
</html>
